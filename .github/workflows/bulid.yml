name: Build APK from Single HTML

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PWABuilder
        run: |
          npm install -g @pwabuilder/pwabuilder

      - name: Build APK
        run: |
          pwabuilder package index.html --platforms android --output ./output

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuranApp-APK
          path: output/android/app-release.apk
