name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y gradle

      - name: Build APK
        run: |
          mkdir -p capacitor-app/android/app/src/main/assets/public
          cp app/src/main/assets/index.html capacitor-app/android/app/src/main/assets/public/
          cp app/src/main/assets/splash.png capacitor-app/android/app/src/main/assets/public/
          cp ic_launcher.png capacitor-app/android/app/src/main/res/drawable/
          cd capacitor-app
          gradle init --type java-application --dsl groovy --test-framework junit-jupiter --project-name QuranApp
          cd android
          gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuranApp-APK
          path: capacitor-app/android/app/build/outputs/apk/release/app-release-unsigned.apk
