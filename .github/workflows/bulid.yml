name: Build APK with Python

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Create Kivy project
        run: |
          mkdir QuranApp
          cd QuranApp
          echo "from kivy.app import App" > main.py
          echo "from kivy.uix.webview import WebView" >> main.py
          echo "class QuranApp(App):" >> main.py
          echo "    def build(self):" >> main.py
          echo "        wv = WebView()" >> main.py
          echo "        wv.load_url('file:///sdcard/index.html')" >> main.py
          echo "        return wv" >> main.py
          echo "if __name__ == '__main__':" >> main.py
          echo "    QuranApp().run()" >> main.py
          cd ..
          cp index.html QuranApp/

      - name: Build APK
        run: |
          cd QuranApp
          yes | buildozer init
          sed -i 's/package.name = myapp/package.name = quranapp/' buildozer.spec
          sed -i 's/package.domain = org.example/package.domain = com.quran/' buildozer.spec
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuranApp-APK
          path: QuranApp/bin/*.apk
