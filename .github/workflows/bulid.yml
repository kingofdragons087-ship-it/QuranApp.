name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android

      - name: Create Capacitor project
        run: |
          mkdir -p capacitor-app
          cd capacitor-app
          npx cap init QuranApp com.quran.app
          npx cap add android

      - name: Copy HTML files to assets
        run: |
          cp index.html capacitor-app/android/app/src/main/assets/public/
          cp splash.png capacitor-app/android/app/src/main/assets/public/
          cp ic_launcher.png capacitor-app/android/app/src/main/res/drawable/

      - name: Build APK
        run: |
          cd capacitor-app/android
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuranApp-APK
          path: capacitor-app/android/app/build/outputs/apk/release/app-release-unsigned.apk
