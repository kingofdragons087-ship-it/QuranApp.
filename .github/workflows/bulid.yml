name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android

      - name: Create full Capacitor project
        run: |
          mkdir -p capacitor-app
          cd capacitor-app
          echo '{"name": "quran-app", "version": "1.0.0", "private": true}' > package.json
          npx cap init QuranApp com.quran.app
          npx cap add android
          # نسخ الملفات إلى المسار الصحيح
          mkdir -p android/app/src/main/assets/public
          cp ../app/src/main/assets/index.html android/app/src/main/assets/public/
          cp ../app/src/main/assets/splash.png android/app/src/main/assets/public/

      - name: Build APK
        run: |
          cd capacitor-app/android
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuranApp-APK
          path: capacitor-app/android/app/build/outputs/apk/release/app-release-unsigned.apk
